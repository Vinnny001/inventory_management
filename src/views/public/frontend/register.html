<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Church Inventory</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="container">
        <h1>Sign Up</h1>
        <form id="signupForm">
            <label for="username">Full Name</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="phone_number">Phone Number</label>
            <input type="tel" id="phone_number" name="phone_number" pattern="^[0-9]{10,15}$" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login here</a></p>
        <div id="message"></div>
    </div>

    <script>
    const form = document.getElementById("signupForm");
    const messageDiv = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            username: form.username.value,
            email: form.email.value,
            phone_number: form.phone_number.value,
            password: form.password.value
        };

        // Show loading message
        messageDiv.style.color = "blue";
        messageDiv.innerText = "Registering...";

        try {
            const res = await fetch("/api/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            if (res.ok) {
                form.reset();
                messageDiv.style.color = "green";
                messageDiv.innerText = result.message;
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);
            } else {
                messageDiv.style.color = "red";
                messageDiv.innerText = result.error || result.message;
            }
        } catch (err) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Error connecting to server";
        }
    });
</script>

</body>
</html>
